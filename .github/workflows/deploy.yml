name: 部署教材网站到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: read
  pages: write
  id-token: write

# 强制所有 JavaScript actions 使用 Node.js 24（消除 Node 20 弃用警告）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# 同一时间只跑一个部署
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: 安装 uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: 安装依赖（含成书工具链）
        run: uv sync

      - name: 构建站点
        run: uv run mkdocs build

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
