# Binder（mybinder.org）运行环境：锁定 Python 3.11，从 conda-forge 装全栈。
# 覆盖第 1-11、14-18 章；第12章(torch)、第13章(transformers)较重，
# 如需可在 notebook 内 `!pip install torch transformers` 临时安装。
name: fds
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy>=1.26
  - pandas>=2.2
  - scipy>=1.13
  - matplotlib-base>=3.8
  - seaborn>=0.13
  - statsmodels>=0.14
  - scikit-learn>=1.5
  - pyarrow>=16.0
  - openpyxl>=3.1
  - tqdm>=4.66
  - arch-py>=6.3
  - linearmodels>=6.0
  - xgboost>=2.0
  - jieba>=0.42
